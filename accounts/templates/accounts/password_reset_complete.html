{% extends 'accounts/base.html' %}

{% block title %}Password Reset Complete - EQ Archives{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <h1 class="mb-3">Password Reset Complete</h1>
                    <p class="mb-4">Your password has been successfully reset! You can now log in with your new password.</p>
                    <a href="{% url 'accounts:login' %}" style="color:black !important; text-decoration: none !important;" class="btn btn-primary">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
