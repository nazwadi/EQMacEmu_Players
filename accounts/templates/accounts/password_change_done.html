{% extends 'accounts/base.html' %}

{% block title %}Password Changed - EQ Archives{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                    <h1 class="mb-2">Password changed</h1>
                    <p class="text-muted mb-4">Your EQ Archives password has been updated successfully.</p>
                    <a href="{% url 'accounts:list_accounts' %}" class="btn btn-primary text-dark w-100">Back to my accounts</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
