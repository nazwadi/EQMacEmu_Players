<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 60">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="45%"  stop-color="#fcc721"/>
      <stop offset="100%" stop-color="#b8941f"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#fcc721" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="emblemShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ── Emblem: larger diamond + vertical bar ── -->
  <g transform="translate(22, 30)" filter="url(#emblemShadow)">
    <rect x="-2" y="-24" width="4" height="48" fill="url(#goldGrad)" rx="1"/>
    <polygon points="0,-16  12,0  0,16  -12,0" fill="url(#goldGrad)"/>
    <polygon points="0,-9  6,0  0,9  -6,0" fill="#ffe580" opacity="0.5"/>
    <rect x="-15" y="-3" width="30" height="5" fill="url(#goldGrad)" rx="1"/>
  </g>

  <!-- ── "EQA" large text ── -->
  <text
    x="48" y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    letter-spacing="1"
    fill="url(#goldGrad)"
    filter="url(#glow)"
  >EQA</text>

  <!-- ── Thin vertical divider ── -->
  <rect x="148" y="10" width="1.5" height="40" fill="#7b714a" opacity="0.8" rx="1"/>

  <!-- ── "Players" — same weight as EQA, slightly smaller ── -->
  <text
    x="158" y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    letter-spacing="2"
    fill="url(#goldGrad)"
    filter="url(#glow)"
  >Players</text>
</svg>
