{% extends 'dkp/base.html' %}
{% block title %}Create Raid — {{ circuit.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="eq-window mt-4" style="padding-top: 40px;">
        <div class="eq-window-title-bar">Create Raid</div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="{% url 'dkp:raid_manage_list' circuit.id %}" class="eq-button-fancy">← Back</a>
            <h4 class="eq-header mb-0">{{ circuit.name }}</h4>
            <div style="width:80px;"></div>
        </div>

        <div class="WindowNestedTan" style="padding:20px; max-width:600px; margin:0 auto 20px;">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label style="color:#8aa3ff; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Date *</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label style="color:#8aa3ff; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Label / Name</label>
                    <input type="text" name="labels" class="form-control" placeholder="e.g. Plane of Sky">
                </div>
                <div class="mb-3">
                    <label style="color:#8aa3ff; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Notes</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Optional notes..."></textarea>
                </div>
                <div class="mb-4 d-flex align-items-center gap-2">
                    <input type="checkbox" name="is_private" id="is_private" class="eq-checkbox">
                    <label for="is_private" style="color:#ccc; margin:0;">Private raid (members only)</label>
                </div>
                <div class="text-center">
                    <button type="submit" class="eq-button-fancy" style="font-size:18px;">Create Raid</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
