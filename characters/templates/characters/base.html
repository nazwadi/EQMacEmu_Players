{% extends 'base.html' %}
{% load static %}
{% load data_utilities %}
{% block sidebar %}{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/eq-ui.css' %}">
{% endblock %}

{% block inline_js %}
    <script>
        function applySpellFilters() {
            const textVal = $("#spell-filter").val().toLowerCase();
            const expansionVal = $("#expansion-filter").val();
            const levelVal = $("#level-filter").val();
            $("[data-spell-row]").each(function () {
                const row = $(this);
                const textMatch = !textVal || row.text().toLowerCase().indexOf(textVal) > -1;
                const expansionMatch = !expansionVal || row.attr("data-expansion") === expansionVal;
                const levelMatch = !levelVal || row.attr("data-level") === levelVal;
                row.toggle(textMatch && expansionMatch && levelMatch);
            });
            $("[data-level-header]").each(function () {
                const level = $(this).attr("data-level-header");
                $(this).toggle($(`[data-spell-row][data-level="${level}"]:visible`).length > 0);
            });
        }
        $(document).ready(function () {
            $("#spell-filter").on("keyup", applySpellFilters);
            $("#expansion-filter").on("change", applySpellFilters);
            $("#level-filter").on("change", applySpellFilters);
        });
        $(document).ready(function () {
            $("#inventory-filter").on("keyup", function () {
                let value = $(this).val().toLowerCase();
                $("#inventory-table tbody>tr").filter(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
        $(document).ready(function () {
            $("#faction-filter").on("keyup", function () {
                let value = $(this).val().toLowerCase();
                $("#faction-table tbody>tr").filter(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
        $(document).ready(function () {
            $("#discovered-filter").on("keyup", function () {
                let value = $(this).val().toLowerCase();
                $("#discovered-item-table tbody>tr").filter(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
    </script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    function activateTab(name) {
        document.querySelectorAll('.eq-tab-box-fancy li').forEach(t => t.classList.remove('eq-tab-open'));
        document.querySelectorAll('.tab-content').forEach(c => { c.style.display = 'none'; c.classList.remove('active'); });
        const tab = document.querySelector('.eq-tab-box-fancy li[data-tab="' + name + '"]');
        if (tab) tab.classList.add('eq-tab-open');
        const content = document.getElementById('tab-' + name);
        if (content) { content.style.display = 'block'; content.classList.add('active'); }
    }

    // Restore tab from URL hash on page load
    const hash = location.hash.replace('#', '');
    if (hash && document.querySelector('.eq-tab-box-fancy li[data-tab="' + hash + '"]')) {
        activateTab(hash);
    }

    // Update hash and switch tab on click
    document.querySelectorAll('.eq-tab-box-fancy li[data-tab]').forEach(tab => {
        tab.addEventListener('click', function() {
            activateTab(this.dataset.tab);
            history.replaceState(null, '', location.pathname + '#' + this.dataset.tab);
        });
    });
});
</script>
{% endblock %}
